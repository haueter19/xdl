<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Daniel Haueter">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <title>Trade Analyzer</title>
    <style>
        .table { font-size: small; }
        .selected { background-color: rgb(144, 238, 144) !important; }
        .player-row { cursor: pointer; }
        .player-row:hover { background-color: #f0f0f0; }
        .player-row.selected:hover { background-color: rgb(120, 220, 120); }
        .totals-row { font-weight: bold; background-color: #e9ecef; }
        .bench-label { font-weight: bold; color: #6c757d; padding: 6px 0; }
        .delta-pos  { color: green; font-weight: bold; }
        .delta-neg  { color: red;   font-weight: bold; }
        .delta-pos-inverse { color: red;   font-weight: bold; }
        .delta-neg-inverse { color: green; font-weight: bold; }
        #tradeResults { display: none; }
        #simulateBtn  { display: none; }
        .trade-summary { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; padding: 10px; margin-bottom: 10px; }
        .spinner-border-sm { width: 1rem; height: 1rem; border-width: .15em; }
        .cat-gain { background-color: #d4edda; }
        .cat-loss { background-color: #f8d7da; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Team Selectors -->
        <div class="row m-2">
            <div class="col-6">
                <select id="team1Select" class="form-select form-select-sm">
                    <option value="" disabled selected>Select Team 1</option>
                    {% for row in teams %}
                    <option value="{{ row }}">{{ row }}</option>
                    {% endfor %}
                </select>
                <span id="team1Loading" style="display:none;">
                    <span class="spinner-border spinner-border-sm" role="status"></span> loading...
                </span>
            </div>
            <div class="col-6">
                <select id="team2Select" class="form-select form-select-sm">
                    <option value="" disabled selected>Select Team 2</option>
                    {% for row in teams %}
                    <option value="{{ row }}">{{ row }}</option>
                    {% endfor %}
                </select>
                <span id="team2Loading" style="display:none;">
                    <span class="spinner-border spinner-border-sm" role="status"></span> loading...
                </span>
            </div>
        </div>

        <!-- Trade Summary (what each side gives up) -->
        <div class="row m-2">
            <div class="col-6">
                <div class="trade-summary">
                    <strong id="team1GetsLabel">Team 2 sends:</strong>
                    <table class="table table-sm mb-0" id="team1Gets">
                        <thead><tr>
                            <th>z</th><th>R</th><th>HR</th><th>RBI</th><th>SB</th><th>BA</th>
                            <th>QS</th><th>SO</th><th>Sv+Hld</th><th>ERA</th><th>WHIP</th>
                        </tr></thead>
                        <tbody><tr>
                            <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>.000</td>
                            <td>0</td><td>0</td><td>0</td><td>0.00</td><td>0.00</td>
                        </tr></tbody>
                    </table>
                </div>
            </div>
            <div class="col-6">
                <div class="trade-summary">
                    <strong id="team2GetsLabel">Team 1 sends:</strong>
                    <table class="table table-sm mb-0" id="team2Gets">
                        <thead><tr>
                            <th>z</th><th>R</th><th>HR</th><th>RBI</th><th>SB</th><th>BA</th>
                            <th>QS</th><th>SO</th><th>Sv+Hld</th><th>ERA</th><th>WHIP</th>
                        </tr></thead>
                        <tbody><tr>
                            <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>.000</td>
                            <td>0</td><td>0</td><td>0</td><td>0.00</td><td>0.00</td>
                        </tr></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Simulate Button -->
        <div class="row m-2">
            <div class="col text-center">
                <button id="simulateBtn" class="btn btn-primary">
                    Simulate Trade
                </button>
                <button id="resetBtn" class="btn btn-outline-secondary ms-2" style="display:none;">
                    Reset
                </button>
            </div>
        </div>

        <!-- Trade Impact (shown after simulate) -->
        <div id="tradeResults" class="row m-2">
            <div class="col-12"><h6 class="mb-1">Trade Impact on Roto Categories</h6></div>
            <div class="col-6">
                <h6 id="results1Label" class="mb-0 text-muted" style="font-size:0.8rem"></h6>
                <table class="table table-sm table-bordered mb-1" id="resultsTable1">
                    <thead><tr>
                        <th></th><th>z</th><th>R</th><th>HR</th><th>RBI</th><th>SB</th><th>BA</th>
                        <th>QS</th><th>SO</th><th>Sv+Hld</th><th>ERA</th><th>WHIP</th>
                    </tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="col-6">
                <h6 id="results2Label" class="mb-0 text-muted" style="font-size:0.8rem"></h6>
                <table class="table table-sm table-bordered mb-1" id="resultsTable2">
                    <thead><tr>
                        <th></th><th>z</th><th>R</th><th>HR</th><th>RBI</th><th>SB</th><th>BA</th>
                        <th>QS</th><th>SO</th><th>Sv+Hld</th><th>ERA</th><th>WHIP</th>
                    </tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- Rosters (before + after, side by side) -->
        <div class="row m-2">
            <div class="col-6">
                <div id="team1RosterLabel" class="bench-label" style="display:none">Current Roster</div>
                <div id="team1Roster"></div>
                <div id="postTeam1RosterWrap" style="display:none">
                    <div class="bench-label mt-2" id="postRoster1Label"></div>
                    <div id="postTeam1Roster"></div>
                </div>
            </div>
            <div class="col-6">
                <div id="team2RosterLabel" class="bench-label" style="display:none">Current Roster</div>
                <div id="team2Roster"></div>
                <div id="postTeam2RosterWrap" style="display:none">
                    <div class="bench-label mt-2" id="postRoster2Label"></div>
                    <div id="postTeam2Roster"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    var teamData     = {};   // cached /optimize results keyed by team name
    var selected1    = {};   // cbsid → playerData for team1 selections
    var selected2    = {};   // cbsid → playerData for team2 selections
    var selectedTeam1 = null;
    var selectedTeam2 = null;

    // ── Helpers ────────────────────────────────────────────────────────────

    function fmt(v, precision) { return (Number(v) || 0).toFixed(precision); }

    function formatPos(val) {
        if (!val) return '';
        if (Array.isArray(val)) return val.join(', ');
        return String(val).replace(/[\[\]'"]/g, '').trim();
    }

    // Compute summary stats from a map of {cbsid: playerData}
    function computeSummary(selectedMap) {
        var t = { z:0, R:0, HR:0, RBI:0, SB:0, H:0, AB:0,
                  QS:0, SO:0, SvHld:0, IP:0, Ha:0, BBa:0, ER:0 };
        Object.values(selectedMap).forEach(function(p) {
            t.z    += Number(p.z    || 0);
            t.R    += Number(p.R    || 0);
            t.HR   += Number(p.HR   || 0);
            t.RBI  += Number(p.RBI  || 0);
            t.SB   += Number(p.SB   || 0);
            t.H    += Number(p.H    || 0);
            t.AB   += Number(p.AB   || 0);
            t.QS   += Number(p.QS   || 0);
            if (p.type === 'p') t.SO += Number(p.SO || 0);  // pitcher SO only
            t.SvHld += Number(p['Sv+Hld'] || 0);
            t.IP   += Number(p.IP   || 0);
            t.Ha   += Number(p.Ha   || 0);
            t.BBa  += Number(p.BBa  || 0);
            t.ER   += Number(p.ER   || 0);
        });
        t.BA   = t.AB > 0 ? t.H  / t.AB : 0;
        t.ERA  = t.IP > 0 ? t.ER / t.IP * 9 : 0;
        t.WHIP = t.IP > 0 ? (t.Ha + t.BBa) / t.IP : 0;
        return t;
    }

    // Render the trade-summary table from a computed totals object
    function renderSummaryTable(tableId, totals) {
        var row = `<tr>
            <td>${fmt(totals.z,1)}</td>
            <td>${fmt(totals.R,1)}</td>
            <td>${fmt(totals.HR,1)}</td>
            <td>${fmt(totals.RBI,1)}</td>
            <td>${fmt(totals.SB,1)}</td>
            <td>.${String(Math.round(totals.BA*1000)).padStart(3,'0')}</td>
            <td>${fmt(totals.QS,1)}</td>
            <td>${fmt(totals.SO,1)}</td>
            <td>${fmt(totals.SvHld,1)}</td>
            <td>${fmt(totals.ERA,2)}</td>
            <td>${fmt(totals.WHIP,2)}</td>
        </tr>`;
        $(`#${tableId} tbody`).html(row);
    }

    function resetSummaryTable(tableId) {
        renderSummaryTable(tableId, {z:0,R:0,HR:0,RBI:0,SB:0,BA:0,QS:0,SO:0,SvHld:0,ERA:0,WHIP:0});
    }

    function updateSimulateBtn() {
        if (Object.keys(selected1).length > 0 && Object.keys(selected2).length > 0) {
            $('#simulateBtn').show();
        } else {
            $('#simulateBtn').hide();
        }
    }

    // ── Roster HTML ────────────────────────────────────────────────────────

    function buildRosterHTML(roster, optTotals, interactive) {
        if (interactive === undefined) interactive = true;
        var rowClass = interactive ? 'player-row' : '';
        var h = '';
        var hitterHdr = `<table class="table table-condensed table-hover table-sm">
            <thead><tr><th>Slot</th><th>Elig</th><th>Player</th><th>z</th>
            <th>R</th><th>HR</th><th>RBI</th><th>SB</th><th>BA</th></tr></thead><tbody>`;
        var pitcherHdr = `<table class="table table-condensed table-hover table-sm">
            <thead><tr><th>Slot</th><th>Elig</th><th>Player</th><th>z</th>
            <th>QS</th><th>SO</th><th>Sv+Hld</th><th>ERA</th><th>WHIP</th></tr></thead><tbody>`;

        var shStarted = false, spStarted = false, bhStarted = false, bpStarted = false;

        function hitterRow(p) {
            var ba = Number(p.AB) > 0 ? (Number(p.H) / Number(p.AB)).toFixed(3) : fmt(p.BA, 3);
            return `<tr class="${rowClass}" data-cbsid="${p.cbsid}">
                <td>${p.optimized_position||''}</td>
                <td style="white-space:nowrap">${formatPos(p.all_pos)}</td>
                <td>${p.Player}</td>
                <td>${fmt(p.z,1)}</td>
                <td>${fmt(p.R,0)}</td><td>${fmt(p.HR,0)}</td>
                <td>${fmt(p.RBI,0)}</td><td>${fmt(p.SB,0)}</td>
                <td>${ba}</td></tr>`;
        }
        function pitcherRow(p) {
            return `<tr class="${rowClass}" data-cbsid="${p.cbsid}">
                <td>${p.optimized_position||''}</td>
                <td style="white-space:nowrap">${formatPos(p.all_pos)}</td>
                <td>${p.Player}</td>
                <td>${fmt(p.z,1)}</td>
                <td>${fmt(p.QS,0)}</td><td>${fmt(p.SO,0)}</td>
                <td>${fmt(p['Sv+Hld'],0)}</td>
                <td>${fmt(p.ERA,2)}</td><td>${fmt(p.WHIP,2)}</td></tr>`;
        }
        function hitterTotals(label, t) {
            var ba = Number(t.AB) > 0 ? (Number(t.H)/Number(t.AB)).toFixed(3) : fmt(t.BA,3);
            return `<tr class="totals-row"><td colspan="3">${label}</td>
                <td>${fmt(t.hitter_z||t.z,1)}</td>
                <td>${fmt(t.R,0)}</td><td>${fmt(t.HR,0)}</td>
                <td>${fmt(t.RBI,0)}</td><td>${fmt(t.SB,0)}</td>
                <td>${ba}</td></tr>`;
        }
        function pitcherTotals(label, t) {
            return `<tr class="totals-row"><td colspan="3">${label}</td>
                <td>${fmt(t.pitcher_z||t.z,1)}</td>
                <td>${fmt(t.QS,0)}</td><td>${fmt(t.SO,0)}</td>
                <td>${fmt(t['Sv+Hld'],0)}</td>
                <td>${fmt(t.ERA,2)}</td><td>${fmt(t.WHIP,2)}</td></tr>`;
        }

        roster.forEach(function(p) {
            if (p.opt_designation === 'starting_hitter') {
                if (!shStarted) { h += '<div class="bench-label">Starting Hitters</div>' + hitterHdr; shStarted = true; }
                h += hitterRow(p);
            }
            if (p.opt_designation === 'starting_pitcher') {
                if (!spStarted) {
                    h += hitterTotals('Hitter Totals', optTotals) + '</tbody></table>';
                    h += '<div class="bench-label">Starting Pitchers</div>' + pitcherHdr;
                    spStarted = true;
                }
                h += pitcherRow(p);
            }
            if (p.opt_designation === 'bench_hitter') {
                if (!bhStarted) {
                    // Close starting pitchers section with totals, then open bench hitters
                    h += pitcherTotals('Pitcher Totals', optTotals) + '</tbody></table>';
                    h += '<div class="bench-label">Bench Hitters</div>' + hitterHdr;
                    bhStarted = true;
                }
                h += hitterRow(p);
            }
            if (p.opt_designation === 'bench_pitcher') {
                if (!bpStarted) {
                    h += '</tbody></table>';
                    h += '<div class="bench-label">Bench Pitchers</div>' + pitcherHdr;
                    bpStarted = true;
                }
                h += pitcherRow(p);
            }
        });
        h += '</tbody></table>';
        return h;
    }

    // ── Before/After results table ─────────────────────────────────────────

    function renderResultsTable(tableId, before, after) {
        var stats = ['z','R','HR','RBI','SB','BA','QS','SO','Sv+Hld','ERA','WHIP'];
        var inverse = ['ERA','WHIP'];
        var precision = { z:1, R:0, HR:0, RBI:0, SB:0, BA:3, QS:0, SO:0, 'Sv+Hld':0, ERA:2, WHIP:2 };
        function v(obj, s) { return Number(obj[s] || obj['Sv+Hld'] || 0); }
        var bRow = '<tr><td><strong>Before</strong></td>';
        var aRow = '<tr><td><strong>After</strong></td>';
        var dRow = '<tr><td><strong>Delta</strong></td>';
        stats.forEach(function(s) {
            var b = v(before, s), a = v(after, s), d = a - b;
            var pr = precision[s] !== undefined ? precision[s] : 1;
            var cls = '';
            if (Math.abs(d) > 0.001) {
                var isPos = d > 0;
                var isInv = inverse.includes(s);
                cls = (isPos !== isInv) ? 'delta-pos' : 'delta-neg';
            }
            bRow += `<td>${b.toFixed(pr)}</td>`;
            aRow += `<td>${a.toFixed(pr)}</td>`;
            dRow += `<td class="${cls}">${d >= 0 ? '+' : ''}${d.toFixed(pr)}</td>`;
        });
        $(`#${tableId} tbody`).html(bRow+'</tr>'+aRow+'</tr>'+dRow+'</tr>');
    }

    // ── Fetch team roster ──────────────────────────────────────────────────

    async function fetchTeamData(tm) {
        if (teamData[tm]) return teamData[tm];
        const resp = await fetch(`/optimize?tm=${encodeURIComponent(tm)}`);
        if (!resp.ok) throw new Error('Failed to fetch ' + tm);
        const data = await resp.json();
        teamData[tm] = data[tm];
        return data[tm];
    }

    // ── Wire up ────────────────────────────────────────────────────────────

    $(document).ready(function() {

        async function loadTeam(side, teamName) {
            var loadId  = '#team' + side + 'Loading';
            var rostId  = '#team' + side + 'Roster';
            $(loadId).show();
            try {
                var data = await fetchTeamData(teamName);
                $(loadId).hide();
                $(rostId).html(buildRosterHTML(data.roster, data.opt_totals));
            } catch(e) {
                $(loadId).hide();
                $(rostId).html('<div class="text-danger">Error loading roster</div>');
            }
        }

        function onTeamChange(side, teamName) {
            if (side === 1) { selected1 = {}; selectedTeam1 = teamName; }
            else            { selected2 = {}; selectedTeam2 = teamName; }
            resetSummaryTable(side === 1 ? 'team2Gets' : 'team1Gets');
            updateSimulateBtn();
            $('#tradeResults').hide();
            $('#resetBtn').hide();
            // Update labels
            var t1 = selectedTeam1 || 'Team 1', t2 = selectedTeam2 || 'Team 2';
            $('#team1GetsLabel').text(t2 + ' sends to ' + t1 + ':');
            $('#team2GetsLabel').text(t1 + ' sends to ' + t2 + ':');
            delete teamData[teamName];
            loadTeam(side, teamName);
        }

        $('#team1Select').change(function() { onTeamChange(1, $(this).val()); });
        $('#team2Select').change(function() { onTeamChange(2, $(this).val()); });

        // Click to select/deselect
        $(document).on('click', '.player-row', function() {
            var cbsid    = $(this).data('cbsid');
            var rosterId = $(this).closest('[id$="Roster"]').attr('id');
            var side     = rosterId && rosterId.includes('team1') ? 1 : 2;
            var selMap   = side === 1 ? selected1 : selected2;
            var teamName = side === 1 ? selectedTeam1 : selectedTeam2;
            var summaryTbl = side === 1 ? 'team2Gets' : 'team1Gets';
            var oppSelMap  = side === 1 ? selected2   : selected1;

            if (!teamName || !teamData[teamName]) return;
            var playerData = teamData[teamName].roster.find(function(p) { return p.cbsid == cbsid; });
            if (!playerData) return;

            if ($(this).hasClass('selected')) {
                $(this).removeClass('selected');
                delete selMap[cbsid];
            } else {
                $(this).addClass('selected');
                selMap[cbsid] = playerData;
            }

            renderSummaryTable(summaryTbl, computeSummary(selMap));
            updateSimulateBtn();
        });

        // Simulate trade
        $('#simulateBtn').click(async function() {
            if (!selectedTeam1 || !selectedTeam2) return;
            var t1p = Object.keys(selected1).map(Number);
            var t2p = Object.keys(selected2).map(Number);
            if (t1p.length === 0 || t2p.length === 0) return;

            $(this).prop('disabled', true)
                   .html('<span class="spinner-border spinner-border-sm"></span> Simulating...');
            try {
                var resp = await fetch('/simulate_trade', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        team1: selectedTeam1, team2: selectedTeam2,
                        team1_players: t1p, team2_players: t2p
                    })
                });
                var result = await resp.json();

                $('#results1Label').text(selectedTeam1);
                $('#results2Label').text(selectedTeam2);
                renderResultsTable('resultsTable1', result.team1.before, result.team1.after);
                renderResultsTable('resultsTable2', result.team2.before, result.team2.after);

                $('#postRoster1Label').text(selectedTeam1 + ' — Post-Trade Roster');
                $('#postRoster2Label').text(selectedTeam2 + ' — Post-Trade Roster');
                $('#postTeam1Roster').html(buildRosterHTML(result.team1.roster, result.team1.after, false));
                $('#postTeam2Roster').html(buildRosterHTML(result.team2.roster, result.team2.after, false));
                $('#team1RosterLabel').show();
                $('#team2RosterLabel').show();
                $('#postTeam1RosterWrap').show();
                $('#postTeam2RosterWrap').show();

                $('#tradeResults').show();
                $('#resetBtn').show();
            } catch(e) {
                alert('Error simulating trade: ' + e.message);
            }
            $(this).prop('disabled', false).text('Simulate Trade');
        });

        // Reset
        $('#resetBtn').click(function() {
            selected1 = {}; selected2 = {};
            $('.player-row').removeClass('selected');
            resetSummaryTable('team1Gets');
            resetSummaryTable('team2Gets');
            $('#tradeResults').hide();
            $('#resetBtn').hide();
            $('#team1RosterLabel').hide();
            $('#team2RosterLabel').hide();
            $('#postTeam1RosterWrap').hide();
            $('#postTeam2RosterWrap').hide();
            updateSimulateBtn();
        });
    });
</script>
</body>
</html>
